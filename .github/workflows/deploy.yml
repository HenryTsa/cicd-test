name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run tests
      run: |
        pip install -r requirements.txt
        pytest test_main.py -v

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo:latest

  deploy-to-k8s:
    runs-on: self-hosted        # ← 這個 job 在你的 WSL2 跑
    needs: test-and-build       # ← 等上面的 job 成功才執行

    steps:
    - name: Deploy to K3s
      run: |
        sudo kubectl set image deployment/cicd-demo \
          cicd-demo=${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo:latest
        sudo kubectl rollout status deployment/cicd-demo
